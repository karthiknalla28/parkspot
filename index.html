<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkSpot – United States</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <h1>ParkSpot</h1>
      <p>United States</p>
    </div>
    <div class="topbar-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="live-status">Connecting...</span>
      </div>
      <button class="btn-topbar" id="refresh-btn" onclick="manualRefresh()">
        <span id="refresh-icon">↻</span>
        <span id="refresh-label">Refresh</span>
      </button>
      <span class="countdown-text">
        Auto in <span id="countdown">60</span>s
      </span>
    </div>
  </div>

  <!-- Search -->
  <div class="searchbar">
    <div class="search-wrapper">
      <input type="text" id="search-input"
        placeholder="Type any street, e.g. Ferry St, Everett..."
        autocomplete="off"/>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <button class="btn-search" onclick="searchStreet()">Find Spots</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="map"></div>
    <div class="sidebar">
      <div class="sidebar-head">Nearby streets</div>
      <div class="street-list" id="street-list">
        <p style="padding:14px;color:#aaa;font-size:13px;">Loading...</p>
      </div>

      <!-- Report panel -->
      <div class="report-panel">
        <div class="rp-header">
          <span class="rp-title">Report parking on this street</span>
          <button class="btn-update" onclick="manualRefresh()">
            <span id="section-refresh-icon">↻</span> Update
          </button>
        </div>

        <!-- No street selected -->
        <div id="no-street-msg"
          style="text-align:center;padding:12px 0;color:#aaa;font-size:12px;">
          Tap a street on the map or list above
        </div>

        <!-- Street selected -->
        <div id="street-selected-panel" style="display:none">

          <div class="selected-label" id="selected-label"></div>

          <!-- Big free spots question -->
          <div style="background:#f8fafc;border:1px solid #e2e8f0;
            border-radius:10px;padding:12px;margin-bottom:10px;text-align:center;">
            <div style="font-size:12px;color:#777;margin-bottom:8px;">
              How many spots are FREE right now?
            </div>
            <div style="display:flex;align-items:center;
              justify-content:center;gap:16px;">
              <button class="adj-btn"
                style="width:32px;height:32px;font-size:18px;"
                onclick="adjustFree(-1)">−</button>
              <span id="free-val"
                style="font-size:32px;font-weight:600;color:#1a1a2e;
                min-width:40px;text-align:center;">0</span>
              <button class="adj-btn"
                style="width:32px;height:32px;font-size:18px;"
                onclick="adjustFree(1)">+</button>
            </div>
            <div style="font-size:11px;color:#aaa;margin-top:6px;">
              out of <span id="total-val">10</span> total spots
              <button onclick="editTotal()"
                style="background:none;border:none;color:#3b82f6;
                font-size:11px;cursor:pointer;padding:0 4px;">(edit)</button>
            </div>
          </div>

          <!-- Edit total (hidden) -->
          <div id="edit-total-row"
            style="display:none;margin-bottom:10px;background:#eff6ff;
            border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;">
            <div style="font-size:11px;color:#1d4ed8;margin-bottom:4px;">
              Correct the total spots for this street:
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <button class="adj-btn" onclick="adjustTotal(-1)">−</button>
              <span id="total-edit-val"
                style="font-size:16px;font-weight:500;
                min-width:24px;text-align:center;">10</span>
              <button class="adj-btn" onclick="adjustTotal(1)">+</button>
              <button onclick="saveTotal()"
                style="margin-left:auto;background:#3b82f6;color:white;
                border:none;border-radius:6px;padding:4px 10px;
                font-size:12px;cursor:pointer;">Save</button>
            </div>
          </div>

          <!-- Freshness bar -->
          <div id="freshness-row"
            style="display:none;margin-bottom:10px;font-size:11px;
            color:#888;display:flex;align-items:center;gap:6px;">
            <div style="flex:1;height:3px;background:#f0f0f0;
              border-radius:2px;overflow:hidden;">
              <div id="fresh-indicator"
                style="height:100%;border-radius:2px;"></div>
            </div>
            <span id="fresh-label">just now</span>
          </div>

          <!-- Comment -->
          <textarea class="comment-input" id="comment-input"
            placeholder='Optional note, e.g. "near the stop sign"'
            style="margin-bottom:10px;"></textarea>

          <!-- Buttons -->
          <button class="btn-free"    onclick="report('free')">
            + I just freed a spot
          </button>
          <button class="btn-taken"   onclick="report('taken')">
            Spot just got taken
          </button>
          <button class="btn-confirm" id="btn-confirm" onclick="confirmReport()">
            Still accurate? Confirm it
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
